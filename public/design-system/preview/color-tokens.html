<!doctype html><html><head><meta charset="utf-8"><title>Semantic tokens</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:10px;">Semantic tokens · light + dark</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div style="padding:14px 16px;background:#FCFCFB;border:1px solid #E5E7E6;border-radius:8px;">
      <div class="mono" style="font-size:10px;color:#6D7370;">light</div>
      <div style="margin-top:10px;display:grid;grid-template-columns:20px 1fr;gap:8px 10px;font-size:11px;align-items:center;">
        <div style="width:20px;height:20px;background:#FCFCFB;border:1px solid #E5E7E6;border-radius:3px;"></div><span>bg</span>
        <div style="width:20px;height:20px;background:#FFFFFF;border:1px solid #E5E7E6;border-radius:3px;"></div><span>bg-elevated</span>
        <div style="width:20px;height:20px;background:#F1F2F1;border-radius:3px;"></div><span>bg-hover</span>
        <div style="width:20px;height:20px;background:#0F1311;border-radius:3px;"></div><span>fg</span>
        <div style="width:20px;height:20px;background:#6D7370;border-radius:3px;"></div><span>fg-muted</span>
        <div style="width:20px;height:20px;background:#0E7A4B;border-radius:3px;"></div><span>accent</span>
      </div>
    </div>
    <div style="padding:14px 16px;background:#0B0E0D;border:1px solid #262D29;border-radius:8px;color:#E8EAE9;">
      <div class="mono" style="font-size:10px;color:#9BA09D;">dark</div>
      <div style="margin-top:10px;display:grid;grid-template-columns:20px 1fr;gap:8px 10px;font-size:11px;align-items:center;">
        <div style="width:20px;height:20px;background:#0B0E0D;border:1px solid #262D29;border-radius:3px;"></div><span>bg</span>
        <div style="width:20px;height:20px;background:#141917;border:1px solid #262D29;border-radius:3px;"></div><span>bg-elevated</span>
        <div style="width:20px;height:20px;background:#1C221F;border-radius:3px;"></div><span>bg-hover</span>
        <div style="width:20px;height:20px;background:#E8EAE9;border-radius:3px;"></div><span>fg</span>
        <div style="width:20px;height:20px;background:#9BA09D;border-radius:3px;"></div><span>fg-muted</span>
        <div style="width:20px;height:20px;background:#1F8456;border-radius:3px;"></div><span>accent</span>
      </div>
    </div>
  </div>
</div></body></html>
