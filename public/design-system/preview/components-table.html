<!doctype html><html><head><meta charset="utf-8"><title>Table row</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" style="padding:18px 24px;">
  <div class="eyebrow" style="margin-bottom:10px;">Investigator list row · compact 32px</div>
  <div style="border:1px solid #E5E7E6;border-radius:8px;overflow:hidden;font-size:13px;">
    <div style="display:grid;grid-template-columns:24px 1.6fr 1fr 0.8fr 0.8fr 0.8fr;gap:12px;padding:8px 12px;background:#F7F7F6;color:#6D7370;font:600 11px Inter;letter-spacing:.04em;text-transform:uppercase;align-items:center;border-bottom:1px solid #E5E7E6;">
      <span></span><span>Investigator</span><span>Specialty</span><span>Enrolled</span><span>On-time</span><span>Score</span>
    </div>
    <div style="display:grid;grid-template-columns:24px 1.6fr 1fr 0.8fr 0.8fr 0.8fr;gap:12px;padding:6px 12px;border-bottom:1px solid #E5E7E6;align-items:center;">
      <input type="checkbox" checked style="accent-color:#0E7A4B;">
      <span><b>Amelia Park, MD</b> <span class="mono" style="color:#6D7370;font-size:11px;">· NPI 1841293857</span></span>
      <span>Oncology · NSCLC</span><span class="mono">127</span><span>94%</span>
      <span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:36px;height:4px;background:#E5E7E6;border-radius:2px;position:relative;"><span style="position:absolute;inset:0;width:82%;background:#0E7A4B;border-radius:2px;"></span></span><b>0.82</b></span>
    </div>
    <div style="display:grid;grid-template-columns:24px 1.6fr 1fr 0.8fr 0.8fr 0.8fr;gap:12px;padding:6px 12px;background:#F7F7F6;align-items:center;">
      <input type="checkbox" style="accent-color:#0E7A4B;">
      <span><b>Ravi Shankar, MD PhD</b> <span class="mono" style="color:#6D7370;font-size:11px;">· NPI 1932847123</span></span>
      <span>Oncology · HER2+</span><span class="mono">84</span><span>89%</span>
      <span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:36px;height:4px;background:#E5E7E6;border-radius:2px;position:relative;"><span style="position:absolute;inset:0;width:74%;background:#0E7A4B;border-radius:2px;"></span></span><b>0.74</b></span>
    </div>
  </div>
</div></body></html>
