<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" style="padding:22px 24px;">
  <div class="eyebrow" style="margin-bottom:12px;">Buttons · primary · secondary · ghost · danger</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
    <button style="height:32px;padding:0 14px;background:#0E7A4B;color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 1px 0 rgba(17,24,39,.08);">Run search</button>
    <button style="height:32px;padding:0 14px;background:#fff;color:#0F1311;border:1px solid #CDD0CE;border-radius:4px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;">Save shortlist</button>
    <button style="height:32px;padding:0 14px;background:transparent;color:#0F1311;border:none;border-radius:4px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;">Cancel</button>
    <button style="height:32px;padding:0 14px;background:#fff;color:#B1452E;border:1px solid #E5E7E6;border-radius:4px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;">Remove site</button>
    <button style="height:32px;padding:0 14px;background:#F1F2F1;color:#9BA09D;border:1px solid #E5E7E6;border-radius:4px;font-family:inherit;font-size:13px;font-weight:500;cursor:not-allowed;">Disabled</button>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px;">
    <button style="height:24px;padding:0 10px;background:#0E7A4B;color:#fff;border:none;border-radius:3px;font-family:inherit;font-size:12px;font-weight:500;">Small</button>
    <button style="height:40px;padding:0 18px;background:#0E7A4B;color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:500;">Medium</button>
    <button style="height:48px;padding:0 22px;background:#0E7A4B;color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:15px;font-weight:500;">Large · marketing</button>
  </div>
</div></body></html>
