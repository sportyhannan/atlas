<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" style="padding:22px 24px;">
  <div class="eyebrow" style="margin-bottom:12px;">Inputs · default · focused · with label · error</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;">
    <div><label style="font-size:12px;font-weight:500;color:#4B514E;">Trial name</label><input placeholder="Phase 3 NSCLC, Seoul" style="margin-top:4px;width:100%;height:32px;padding:0 10px;border:1px solid #CDD0CE;border-radius:4px;font-family:inherit;font-size:13px;background:#fff;"></div>
    <div><label style="font-size:12px;font-weight:500;color:#4B514E;">Condition <span style="color:#9BA09D;font-weight:400;">(focused)</span></label><input value="NSCLC" style="margin-top:4px;width:100%;height:32px;padding:0 10px;border:2px solid #0E7A4B;border-radius:4px;font-family:inherit;font-size:13px;background:#fff;outline:none;"></div>
    <div><label style="font-size:12px;font-weight:500;color:#4B514E;">Min enrollments/yr</label><input value="abc" style="margin-top:4px;width:100%;height:32px;padding:0 10px;border:1px solid #B1452E;border-radius:4px;font-family:inherit;font-size:13px;background:#fff;"><div style="font-size:11px;color:#B1452E;margin-top:4px;">Must be a number.</div></div>
    <div><label style="font-size:12px;font-weight:500;color:#4B514E;">Country</label><select style="margin-top:4px;width:100%;height:32px;padding:0 10px;border:1px solid #CDD0CE;border-radius:4px;font-family:inherit;font-size:13px;background:#fff;"><option>South Korea</option></select></div>
  </div>
</div></body></html>
