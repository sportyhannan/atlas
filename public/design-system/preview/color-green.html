<!doctype html><html><head><meta charset="utf-8"><title>Clinical Green</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:10px;">Clinical green · primary accent</div>
  <div style="display:grid;grid-template-columns:repeat(9,1fr);gap:6px;">
    <div><div style="aspect-ratio:1;background:#EDF6F0;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">50</div></div>
    <div><div style="aspect-ratio:1;background:#D6EADD;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">100</div></div>
    <div><div style="aspect-ratio:1;background:#A9D3B7;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">200</div></div>
    <div><div style="aspect-ratio:1;background:#76B68D;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">300</div></div>
    <div><div style="aspect-ratio:1;background:#479A6B;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">400</div></div>
    <div><div style="aspect-ratio:1;background:#1F8456;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">500</div></div>
    <div style="position:relative;"><div style="aspect-ratio:1;background:#0E7A4B;border-radius:4px;outline:2px solid var(--atlas-fg-strong);outline-offset:2px;"></div><div class="mono" style="font-size:10px;margin-top:8px;font-weight:600;">600 ★</div></div>
    <div><div style="aspect-ratio:1;background:#0A6039;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">700</div></div>
    <div><div style="aspect-ratio:1;background:#074A2C;border-radius:4px;"></div><div class="mono" style="font-size:10px;margin-top:4px;">800</div></div>
  </div>
  <div class="muted" style="font-size:12px;margin-top:14px;">600 is the brand primary. Reads as "validated / go" — not startup-bright.</div>
</div></body></html>
