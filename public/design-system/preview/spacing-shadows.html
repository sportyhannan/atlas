<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" style="padding:28px 24px;background:#FCFCFB;">
  <div class="eyebrow" style="margin-bottom:20px;">Elevation · cool-neutral, never warm</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;">
    <div style="text-align:center;"><div style="height:72px;background:#FFF;border-radius:8px;box-shadow:0 1px 0 rgba(17,24,39,0.04);"></div><div class="mono" style="font-size:10px;margin-top:8px;">xs · buttons</div></div>
    <div style="text-align:center;"><div style="height:72px;background:#FFF;border-radius:8px;box-shadow:0 1px 2px rgba(17,24,39,0.06),0 1px 3px rgba(17,24,39,0.04);"></div><div class="mono" style="font-size:10px;margin-top:8px;">sm · cards</div></div>
    <div style="text-align:center;"><div style="height:72px;background:#FFF;border-radius:8px;box-shadow:0 4px 12px rgba(17,24,39,0.08),0 2px 4px rgba(17,24,39,0.04);"></div><div class="mono" style="font-size:10px;margin-top:8px;">md · menus</div></div>
    <div style="text-align:center;"><div style="height:72px;background:#FFF;border-radius:8px;box-shadow:0 12px 32px rgba(17,24,39,0.12),0 4px 12px rgba(17,24,39,0.06);"></div><div class="mono" style="font-size:10px;margin-top:8px;">lg · modals</div></div>
  </div>
</div></body></html>
