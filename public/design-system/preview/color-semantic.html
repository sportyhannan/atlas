<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:12px;">Semantic · muted, audit-grade</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
    <div>
      <div style="display:flex;gap:4px;"><div style="flex:1;height:44px;background:#EDF6F0;border-radius:4px 0 0 4px;"></div><div style="flex:2;height:44px;background:#0E7A4B;"></div><div style="flex:1;height:44px;background:#074A2C;border-radius:0 4px 4px 0;"></div></div>
      <div style="margin-top:6px;font-size:12px;font-weight:600;">Success</div>
      <div class="mono muted" style="font-size:10px;">green-600</div>
    </div>
    <div>
      <div style="display:flex;gap:4px;"><div style="flex:1;height:44px;background:#FBF4E6;border-radius:4px 0 0 4px;"></div><div style="flex:2;height:44px;background:#B8892A;"></div><div style="flex:1;height:44px;background:#7F5D17;border-radius:0 4px 4px 0;"></div></div>
      <div style="margin-top:6px;font-size:12px;font-weight:600;">Warning</div>
      <div class="mono muted" style="font-size:10px;">ochre · not yellow</div>
    </div>
    <div>
      <div style="display:flex;gap:4px;"><div style="flex:1;height:44px;background:#FAEDEA;border-radius:4px 0 0 4px;"></div><div style="flex:2;height:44px;background:#B1452E;"></div><div style="flex:1;height:44px;background:#7D2D1D;border-radius:0 4px 4px 0;"></div></div>
      <div style="margin-top:6px;font-size:12px;font-weight:600;">Danger</div>
      <div class="mono muted" style="font-size:10px;">brick · not red</div>
    </div>
    <div>
      <div style="display:flex;gap:4px;"><div style="flex:1;height:44px;background:#ECF1F6;border-radius:4px 0 0 4px;"></div><div style="flex:2;height:44px;background:#335784;"></div><div style="flex:1;height:44px;background:#223D5E;border-radius:0 4px 4px 0;"></div></div>
      <div style="margin-top:6px;font-size:12px;font-weight:600;">Info</div>
      <div class="mono muted" style="font-size:10px;">slate · not cobalt</div>
    </div>
  </div>
</div></body></html>
