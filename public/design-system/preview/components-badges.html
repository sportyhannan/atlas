<!doctype html><html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" style="padding:22px 24px;">
  <div class="eyebrow" style="margin-bottom:14px;">Status badges · muted, not neon</div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;background:#EDF6F0;color:#074A2C;border-radius:9999px;font:500 11px Inter;"><span style="width:6px;height:6px;background:#0E7A4B;border-radius:50%;"></span>Enrolling</span>
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;background:#FBF4E6;color:#7F5D17;border-radius:9999px;font:500 11px Inter;"><span style="width:6px;height:6px;background:#B8892A;border-radius:50%;"></span>Slow enrollment</span>
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;background:#FAEDEA;color:#7D2D1D;border-radius:9999px;font:500 11px Inter;"><span style="width:6px;height:6px;background:#B1452E;border-radius:50%;"></span>FDA warning letter</span>
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;background:#ECF1F6;color:#223D5E;border-radius:9999px;font:500 11px Inter;"><span style="width:6px;height:6px;background:#335784;border-radius:50%;"></span>Previously engaged</span>
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;background:#F1F2F1;color:#313633;border-radius:9999px;font:500 11px Inter;">Phase 3</span>
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;background:#F1F2F1;color:#313633;border-radius:9999px;font:500 11px Inter;">Oncology</span>
    <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;background:#0F1311;color:#fff;border-radius:4px;font:600 10px 'IBM Plex Mono';letter-spacing:.04em;">NEW</span>
  </div>
  <div style="margin-top:14px;display:flex;gap:8px;align-items:center;">
    <span style="display:inline-flex;align-items:center;gap:4px;height:20px;padding:0 8px;background:#EDF6F0;color:#074A2C;border-radius:4px;font:600 10px 'IBM Plex Mono';letter-spacing:.04em;">VERIFIED · CITED 4</span>
    <span style="display:inline-flex;align-items:center;gap:4px;height:20px;padding:0 8px;background:#F1F2F1;color:#313633;border-radius:4px;font:600 10px 'IBM Plex Mono';letter-spacing:.04em;">CTG · NCT05482451</span>
  </div>
</div></body></html>
