<!doctype html><html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" style="padding:22px 24px;">
  <div class="eyebrow" style="margin-bottom:12px;">Badges · status, phase, evidence</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <span style="display:inline-flex;align-items:center;gap:6px;padding:2px 8px;height:20px;background:#EDF6F0;color:#074A2C;border-radius:10px;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#0E7A4B;"></span>Enrolling</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:2px 8px;height:20px;background:#FBF4E6;color:#7F5D17;border-radius:10px;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#B8892A;"></span>Pending</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:2px 8px;height:20px;background:#FAEDEA;color:#7D2D1D;border-radius:10px;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#B1452E;"></span>Warning letter</span>
    <span style="display:inline-flex;padding:2px 8px;height:20px;background:#F1F2F1;color:#4B514E;border-radius:3px;font-size:11px;font-weight:600;font-family:var(--atlas-font-mono);">Phase 3</span>
    <span style="display:inline-flex;padding:2px 8px;height:20px;background:#F1F2F1;color:#4B514E;border-radius:3px;font-size:11px;font-weight:600;font-family:var(--atlas-font-mono);">NSCLC</span>
    <span style="display:inline-flex;align-items:center;gap:5px;padding:2px 8px;height:20px;background:#EDF6F0;color:#074A2C;border:1px solid #A9D3B7;border-radius:3px;font-size:11px;font-weight:500;">✓ Cited · 14 sources</span>
    <span style="display:inline-flex;padding:2px 8px;height:20px;background:#ECF1F6;color:#223D5E;border-radius:3px;font-size:11px;font-weight:500;">AI inferred</span>
  </div>
</div></body></html>
