<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" style="padding:22px 24px;">
  <div class="eyebrow" style="margin-bottom:14px;">Buttons · default, hover, pressed, disabled</div>
  <div style="display:grid;grid-template-columns:repeat(4,auto);gap:10px 12px;align-items:center;justify-content:start;">
    <!-- Primary -->
    <button style="height:32px;padding:0 14px;background:#0E7A4B;color:#fff;border:none;border-radius:4px;font:500 13px/1 Inter;box-shadow:0 1px 0 rgba(17,24,39,.04);">Run search</button>
    <button style="height:32px;padding:0 14px;background:#0A6039;color:#fff;border:none;border-radius:4px;font:500 13px/1 Inter;">Run search</button>
    <button style="height:32px;padding:0 14px;background:#074A2C;color:#fff;border:none;border-radius:4px;font:500 13px/1 Inter;box-shadow:inset 0 1px 0 rgba(0,0,0,.08);">Run search</button>
    <button style="height:32px;padding:0 14px;background:#0E7A4B;color:#fff;border:none;border-radius:4px;font:500 13px/1 Inter;opacity:.4;cursor:not-allowed;">Run search</button>
    <!-- Secondary -->
    <button style="height:32px;padding:0 14px;background:#fff;color:#0F1311;border:1px solid #CDD0CE;border-radius:4px;font:500 13px/1 Inter;">Export CSV</button>
    <button style="height:32px;padding:0 14px;background:#F1F2F1;color:#0F1311;border:1px solid #CDD0CE;border-radius:4px;font:500 13px/1 Inter;">Export CSV</button>
    <button style="height:32px;padding:0 14px;background:#E5E7E6;color:#0F1311;border:1px solid #9BA09D;border-radius:4px;font:500 13px/1 Inter;">Export CSV</button>
    <button style="height:32px;padding:0 14px;background:#fff;color:#0F1311;border:1px solid #CDD0CE;border-radius:4px;font:500 13px/1 Inter;opacity:.4;">Export CSV</button>
    <!-- Ghost -->
    <button style="height:32px;padding:0 12px;background:transparent;color:#0F1311;border:none;border-radius:4px;font:500 13px/1 Inter;">Cancel</button>
    <button style="height:32px;padding:0 12px;background:#F1F2F1;color:#0F1311;border:none;border-radius:4px;font:500 13px/1 Inter;">Cancel</button>
    <button style="height:32px;padding:0 12px;background:#E5E7E6;color:#0F1311;border:none;border-radius:4px;font:500 13px/1 Inter;">Cancel</button>
    <button style="height:32px;padding:0 12px;background:transparent;color:#0F1311;border:none;border-radius:4px;font:500 13px/1 Inter;opacity:.4;">Cancel</button>
  </div>
  <div class="mono muted" style="font-size:10px;margin-top:12px;">rest · hover · pressed · disabled &nbsp;·&nbsp; 32px compact, 4px radius</div>
</div></body></html>
